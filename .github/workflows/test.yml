name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

# Limit concurrent runs to prevent resource abuse
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Restrict permissions to minimum required
permissions:
  contents: read

env:
  FOUNDRY_PROFILE: ci

jobs:
  validate-addresses:
    name: Validate Address Registry
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Run validator
        run: bash addresses/validate.sh

  build-package:
    name: Build @40-acres/contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.2.3
          cache: true

      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: foundry-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'foundry.toml') }}
          restore-keys: |
            foundry-${{ runner.os }}-

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package (forge build + wagmi generate + addresses + tsc)
        run: pnpm build:package

      - name: Smoke-test package import
        run: |
          cat > /tmp/smoke.ts <<'EOF'
          import { addresses, loanAbi, vaultAbi } from '@40-acres/contracts';
          if (!addresses.base.aerodrome.strategies['usdc-loan'].supplyVault.prod) {
            throw new Error('addresses tree missing expected key');
          }
          if (loanAbi.length === 0 || vaultAbi.length === 0) {
            throw new Error('ABIs are empty');
          }
          console.log('OK', { abis: ['loan', 'vault'].length, addresses: 'resolved' });
          EOF
          pnpm exec tsx /tmp/smoke.ts

  test:
    name: Local Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.2.3
          cache: true

      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: foundry-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'script/**/*.sol', 'foundry.toml') }}
          restore-keys: |
            foundry-${{ runner.os }}-

      - name: Run Forge build
        run: |
          forge --version
          forge build --sizes
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv

  fork-test:
    name: Fork Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.2.3
          cache: true

      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: foundry-${{ runner.os }}-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'script/**/*.sol', 'foundry.toml') }}
          restore-keys: |
            foundry-${{ runner.os }}-

      - name: Run Fork tests
        run: |
          forge test -vvv
        env:
          FOUNDRY_PROFILE: fork
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
          AVAX_RPC_URL: ${{ secrets.AVAX_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          LINEA_RPC_URL: ${{ secrets.LINEA_RPC_URL }}
          OP_RPC_URL: ${{ secrets.OP_RPC_URL }}
          INK_RPC_URL: ${{ secrets.INK_RPC_URL }}
